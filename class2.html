<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class 2</title>
</head>

<body>
    <!-- inline & block elements -->
    <!-- inline element = takes up the full width available (whole block) new content start from new line -->
    <!-- block element = takes up only necessary width new content don't start from new line -->

    <!-- div = div is a container used to hold other html element or group elements together it is slso block element -->

    <div>
        <a href="https://www.google.com/?hl=en&gl=in&zx=1773678625687&no_sw_cr=1">Google</a>
        <a href=https://www.youtube.com/?gl=IN>Youtube</a>
    </div>
    <a href="https://www.facebook.com/">Facebook</a>
    <br>
    <hr>

    <!-- span = span is also a generic container used to hold other html element or group elements together -->

    <span>
        <a href="https://www.google.com/?hl=en&gl=in&zx=1773678625687&no_sw_cr=1">Google</a>
        <a href=https://www.youtube.com/?gl=IN>Youtube</a>
    </span>
    <a href="https://www.facebook.com/">Facebook</a>

    <!-- hr = horizontal rulr element -->

    <h1>Lorem ipsum dolor sit amet.</h1>
    <hr>
    <h1>Lorem ipsum dolor sit amet.</h1>

    <!-- sub & sup = both tag is used to define maths, chemistry & physics formula (sub = subscript)(sup = superscript) -->

    <h1>water formula H<sub>2</sub>O</h1>

    <h1>Pythagoras formula A<sup>2</sup>+B<sup>2</sup>=C<sup>2</sup></h1>
</body>

</html>
